feature:
  name: ai-strategy-narrative-simulator
  version: 0.2.0
  product: choose-your-own-adventure-simulation

components:

  SCENARIOS:
    requirements:
      1: Users can create and manage scenarios
      2: Scenarios must include initial world state and actors
      3: Scenarios must support persistence across sessions

  ACTORS:
    requirements:
      1: Actors must have goals, resources, constraints, and traits
      2: Actors must participate in simulation decisions
      3: Relationships between actors must be modeled

  WORLD_STATE:
    requirements:
      1: The system must maintain structured world variables
      2: Variables must be bounded and validated
      3: State must persist across turns

  SIMULATION:
    requirements:
      1: Each player action must trigger a simulation turn
      2: The system must gather relevant context before simulation
      3: The LLM must propose structured consequences
      4: The backend must validate all changes before applying
      5: The backend must maintain canonical state
      6: Simulation results must produce a player-facing page

  TURN_PAGES:
    requirements:
      1: Each turn must generate a rendered page
      2: A page must include narrative, state summary, and choices
      3: Pages must reflect consequences of prior actions
      4: Pages must be derived from validated state

  CHOICES:
    requirements:
      1: Each page must present 2-5 choices
      2: Choices must be grounded in current state
      3: Choices must be distinct and meaningful
      4: The system must prevent invalid choices

  STATE_VISIBILITY:
    requirements:
      1: The system must separate player-visible and hidden state
      2: Pages must show summarized relevant state
      3: Hidden state must not be exposed unless revealed

  HISTORY:
    requirements:
      1: The system must record events and outcomes per turn
      2: Users must be able to review past turns
      3: History must be usable for simulation context

  AI_ASSIST:
    requirements:
      1: AI assistance must be user-invoked
      2: AI suggestions must not auto-apply
      3: Users must review and accept suggestions

constraints:

  STATE:
    requirements:
      1: Canonical state must be backend-owned
      2: The LLM must not directly mutate state
      3: All state changes must be validated

  VALIDATION:
    requirements:
      1: Prevent hallucinated entities
      2: Enforce resource limits
      3: Enforce valid transitions

  UX:
    requirements:
      1: Users must understand outcomes clearly
      2: Pages must clearly present choices
      3: The system must maintain narrative coherence

  MVP_SCOPE:
    requirements:
      1: No multiplayer support
      2: No long autonomous simulations
      3: No deep hidden systems
