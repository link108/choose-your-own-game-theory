# Daily living-scenarios news pass.
#
# Reference manifest — the live copy is k3s/apps/game-theory-sim/base/cronjob.yaml in the
# homelab repo. It reuses the app image and the app's config/secret (DATABASE_URL,
# DEEPSEEK_API_KEY); drafts land in the /admin review UI, nothing goes live unreviewed,
# so a failed or duplicate run is always harmless.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: game-theory-sim-living
  labels:
    app: game-theory-sim
spec:
  schedule: "0 12 * * *" # daily, 12:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 900
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: living-run
              image: link108/game-theory-sim:latest
              command: ["uv", "run", "--no-sync", "python", "-m", "app.living_run"]
              envFrom:
                - configMapRef:
                    name: game-theory-sim-config
                - secretRef:
                    name: game-theory-sim-secrets
