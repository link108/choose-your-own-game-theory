# Daily living-scenarios news pass.
#
# Reference manifest — copy into the homelab repo next to the game-theory-sim
# Deployment. Adjust the namespace and secret name to match; the image tag is pinned by
# the same GitOps flow as the app. It reuses the app image and the app's DATABASE_URL /
# DEEPSEEK_API_KEY secret; drafts land in the /admin review UI, nothing goes live
# unreviewed, so a failed or duplicate run is always harmless.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: game-theory-sim-living
spec:
  schedule: "0 12 * * *" # daily, 12:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 900
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: living-run
              image: link108/game-theory-sim:latest
              command: ["uv", "run", "--no-sync", "python", "-m", "app.living_run"]
              envFrom:
                - secretRef:
                    name: game-theory-sim # DATABASE_URL, DEEPSEEK_API_KEY
