services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyoa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5433 to stay clear of any local postgres on the default port
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyoa"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
