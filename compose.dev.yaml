services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: game_theory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d game_theory"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    volumes:
      - ./app/src:/app/src
      - ./app/prisma:/app/prisma
      - ./app/public:/app/public
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/game_theory"
      LLM_PROVIDER: "${LLM_PROVIDER:-openrouter}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
